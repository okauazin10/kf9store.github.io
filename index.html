<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KF9 Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
}

h1 {
    color: gold;
    margin-top: 20px;
}

.banner {
    background: linear-gradient(black, #111);
    padding: 20px;
}

.produtos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.produto {
    background: #111;
    padding: 15px;
    border-radius: 12px;
    width: 200px;
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

.produto img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 8px;
}

button:hover {
    background: orange;
}

.carrinho {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    padding: 15px;
    box-shadow: 0 -2px 10px rgba(255,215,0,0.3);
}

.finalizar {
    background: green;
    color: white;
    padding: 12px 25px;
    border-radius: 10px;
    font-size: 16px;
}

</style>
</head>

<body>

<div class="banner">
    <h1>KF9 STORE</h1>
    <p>🔥 Ofertas imperdíveis em chuteiras</p>
</div>

<div class="produtos">

<div class="produto">
<img src="https://via.placeholder.com/200">
<p>Chuteira Nike</p>
<strong>R$ 459</strong><br>
<button onclick="addCarrinho('Chuteira Nike - R$459')">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/200">
<p>Chuteira Adidas</p>
<strong>R$ 459</strong><br>
<button onclick="addCarrinho('Chuteira Adidas - R$499')">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/200">
<p>Chuteira Puma</p>
<strong>R$ 459</strong><br>
<button onclick="addCarrinho('Chuteira Puma - R$479')">Adicionar</button>
</div>

</div>

<div class="carrinho">
<button class="finalizar" onclick="enviarWhats()">📲 Finalizar Pedido</button>
</div>

<script>
let carrinho = [];

function addCarrinho(produto){
    carrinho.push(produto);
    alert("Produto adicionado!");
}

function enviarWhats(){
    if(carrinho.length === 0){
        alert("Carrinho vazio!");
        return;
    }

    let mensagem = "🛒 Pedido KF9 Store:%0A";

    carrinho.forEach(item => {
        mensagem += "- " + item + "%0A";
    });

    let numero = "19981557038";

    let url = "https://wa.me/" + numero + "?text=" + mensagem;

    window.open(url, "_blank");
}
</script>

</body>
</html>
