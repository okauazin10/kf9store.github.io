<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KF9 Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* TOPO */
.header {
    text-align: center;
    padding: 30px;
    background: linear-gradient(black, #111);
}

.header h1 {
    color: gold;
    font-size: 40px;
}

/* PRODUTOS */
.produtos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 20px;
}

.produto {
    background: #111;
    padding: 15px;
    border-radius: 12px;
    width: 220px;
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
    text-align: center;
}

.produto img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 8px;
}

button:hover {
    background: orange;
}

/* CARRINHO */
.carrinho {
    position: fixed;
    right: 0;
    top: 0;
    width: 250px;
    height: 100%;
    background: #111;
    padding: 15px;
    box-shadow: -2px 0 10px rgba(255,215,0,0.3);
}

.carrinho h2 {
    color: gold;
}

.item {
    font-size: 14px;
    margin: 5px 0;
}

.finalizar {
    background: green;
    color: white;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="header">
    <h1>KF9 STORE</h1>
    <p>🔥 Chuteiras com estilo e performance</p>
</div>

<div class="produtos">

<div class="produto">
<img src="https://via.placeholder.com/200">
<p>Chuteira Nike</p>
<strong>R$ 459</strong>
<button onclick="addCarrinho('Chuteira Nike - R$459')">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/200">
<p>Chuteira Adidas</p>
<strong>R$ 499</strong>
<button onclick="addCarrinho('Chuteira Adidas - R$499')">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/200">
<p>Chuteira Puma</p>
<strong>R$ 479</strong>
<button onclick="addCarrinho('Chuteira Puma - R$479')">Adicionar</button>
</div>

</div>

<div class="carrinho">
<h2>🛒 Carrinho</h2>
<div id="lista"></div>

<button class="finalizar" onclick="enviarWhats()">Finalizar no WhatsApp</button>
</div>

<script>
let carrinho = [];

function addCarrinho(produto){
    carrinho.push(produto);
    atualizarCarrinho();
}

function atualizarCarrinho(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    carrinho.forEach(item => {
        lista.innerHTML += `<div class="item">- ${item}</div>`;
    });
}

function enviarWhats(){
    if(carrinho.length === 0){
        alert("Carrinho vazio!");
        return;
    }

    let mensagem = "🛒 Pedido KF9 Store:%0A";

    carrinho.forEach(item => {
        mensagem += "- " + item + "%0A";
    });

    let numero = "SEUNUMERO";

    let url = "https://wa.me/" + numero + "?text=" + mensagem;

    window.open(url, "_blank");
}
</script>

</body>
</html>
